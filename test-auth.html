<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.4.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 16px; }
        pre { background: #f4f4f4; padding: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h2>Spring Boot Auth Template - Test</h2>

    <div>
        <button onclick="signInWithGoogle()">Sign in with Google</button>
        <button onclick="signInWithApple()">Sign in with Apple</button>
        <button onclick="refreshToken()">Refresh Token</button>
        <button onclick="revokeToken()">Revoke (Logout)</button>
        <button onclick="getMe()">GET /users/me</button>
    </div>

    <h3>Log:</h3>
    <div id="log"></div>

    <script>
        const API = 'http://localhost:7070/api/v1';

        firebase.initializeApp({
            apiKey: "AIzaSyBmVTHDJQha29OO9N_joApkYnv1l8ZrXro",
            authDomain: "test-6f7ea.firebaseapp.com",
            projectId: "test-6f7ea",
            storageBucket: "test-6f7ea.firebasestorage.app",
            messagingSenderId: "396697761661",
            appId: "1:396697761661:web:2694063863cf6fa34b7e14"
        });

        let accessToken = null;
        let refreshTokenValue = null;

        function log(msg, cls) {
            const el = document.createElement('pre');
            el.className = cls || '';
            el.textContent = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
            document.getElementById('log').prepend(el);
        }

        async function signInWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.addScope('email');
                provider.addScope('profile');
                const result = await firebase.auth().signInWithPopup(provider);
                const credential = result.credential;
                const googleIdToken = credential ? credential.idToken : null;

                if (!googleIdToken) {
                    // Fallback: use Firebase ID token (won't work with Google verifier)
                    log('credential.idToken is null — check console for full result', 'error');
                    console.log('Full result:', result);
                    console.log('Credential:', credential);
                    return;
                }

                log('Google ID Token (first 50 chars): ' + googleIdToken.substring(0, 50) + '...');

                // Send to backend
                const res = await fetch(API + '/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idToken: googleIdToken,
                        name: result.user.displayName,
                        picture: result.user.photoURL
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    accessToken = data.accessToken;
                    refreshTokenValue = data.refreshToken;
                    log(data, 'success');
                } else {
                    log(data, 'error');
                }
            } catch (e) {
                log('Error: ' + e.message, 'error');
            }
        }

        async function signInWithApple() {
            try {
                const provider = new firebase.auth.OAuthProvider('apple.com');
                provider.addScope('email');
                provider.addScope('name');
                const result = await firebase.auth().signInWithPopup(provider);
                const credential = result.credential;
                const appleIdToken = credential ? credential.idToken : null;

                if (!appleIdToken) {
                    log('credential.idToken is null — check console for full result', 'error');
                    console.log('Full result:', result);
                    console.log('Credential:', credential);
                    return;
                }

                log('Apple ID Token (first 50 chars): ' + appleIdToken.substring(0, 50) + '...');

                // Extract name from Firebase user (only available on first sign-in)
                const displayName = result.user.displayName || '';
                const parts = displayName.split(' ');
                const givenName = parts[0] || null;
                const familyName = parts.slice(1).join(' ') || null;

                const res = await fetch(API + '/auth/apple', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idToken: appleIdToken,
                        givenName: givenName,
                        familyName: familyName
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    accessToken = data.accessToken;
                    refreshTokenValue = data.refreshToken;
                    log(data, 'success');
                } else {
                    log(data, 'error');
                }
            } catch (e) {
                log('Error: ' + e.message, 'error');
            }
        }

        async function refreshToken() {
            if (!refreshTokenValue) { log('No refresh token — sign in first', 'error'); return; }
            try {
                const res = await fetch(API + '/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: refreshTokenValue })
                });
                const data = await res.json();
                if (res.ok) {
                    accessToken = data.accessToken;
                    refreshTokenValue = data.refreshToken;
                    log(data, 'success');
                } else {
                    log(data, 'error');
                }
            } catch (e) {
                log('Error: ' + e.message, 'error');
            }
        }

        async function revokeToken() {
            if (!refreshTokenValue) { log('No refresh token', 'error'); return; }
            try {
                const res = await fetch(API + '/auth/revoke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: refreshTokenValue })
                });
                const data = await res.json();
                log(data, res.ok ? 'success' : 'error');
                if (res.ok) { accessToken = null; refreshTokenValue = null; }
            } catch (e) {
                log('Error: ' + e.message, 'error');
            }
        }

        async function getMe() {
            if (!accessToken) { log('No access token — sign in first', 'error'); return; }
            try {
                const res = await fetch(API + '/users/me', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const data = await res.json();
                log(data, res.ok ? 'success' : 'error');
            } catch (e) {
                log('Error: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
