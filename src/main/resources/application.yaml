spring:
  application:
    name: template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false

server:
  port: 7070

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8082
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:396697761661-kl4j8dr0ed48nqcauhdbrsub6e7k2mq2.apps.googleusercontent.com}
    apple:
      bundle-id: ${APPLE_BUNDLE_ID:com.example.app}
    refresh-token:
      expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:placeholder}
      auth-token: ${TWILIO_AUTH_TOKEN:placeholder}
      verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:placeholder}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:template}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
  jpa:
    hibernate:
      ddl-auto: validate

app:
  security:
    jwt:
      keystore-location: ${JWT_KEYSTORE_LOCATION}
      keystore-password: ${JWT_KEYSTORE_PASSWORD}
      key-alias: ${JWT_KEY_ALIAS:jwt}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
