spring:
  application:
    name: template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 7070

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: kz.innlab.template

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8082
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:123456789-abc.apps.googleusercontent.com}
    apple:
      bundle-id: ${APPLE_BUNDLE_ID:com.example.app}
    refresh-token:
      expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30}
  notification:
    token:
      max-per-user: ${NOTIFICATION_MAX_TOKENS_PER_USER:5}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
  mail:
    enabled: ${MAIL_ENABLED:false}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      from: ${SMTP_FROM:noreply@example.com}
      ssl-enabled: ${SMTP_SSL_ENABLED:false}
    imap:
      host: ${IMAP_HOST:}
      port: ${IMAP_PORT:993}
      username: ${IMAP_USERNAME:}
      password: ${IMAP_PASSWORD:}
      ssl-enabled: ${IMAP_SSL_ENABLED:true}
    retry:
      max-attempts: ${MAIL_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${MAIL_RETRY_DELAY_MS:5000}
