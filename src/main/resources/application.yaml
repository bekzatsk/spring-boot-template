spring:
  application:
    name: template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: kz.innlab.starter

app:
  auth:
    google:
      enabled: ${AUTH_GOOGLE_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
    apple:
      enabled: ${AUTH_APPLE_ENABLED:false}
      bundle-id: ${APPLE_BUNDLE_ID:com.example.app}
    local:
      enabled: ${AUTH_LOCAL_ENABLED:true}
    phone:
      enabled: ${AUTH_PHONE_ENABLED:true}
    refresh-token:
      expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30}
  notification:
    token:
      max-per-user: ${NOTIFICATION_MAX_TOKENS_PER_USER:5}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
  mail:
    enabled: ${MAIL_ENABLED:false}
    encryption-key: ${MAIL_ENCRYPTION_KEY:}
    external:
      base-url: ${MAIL_EXTERNAL_BASE_URL:}
      master-key: ${MAIL_EXTERNAL_MASTER_KEY:}
    smtp:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      from: ${SMTP_FROM:noreply@example.com}
      ssl-enabled: ${SMTP_SSL_ENABLED:false}
    imap:
      host: ${IMAP_HOST:}
      port: ${IMAP_PORT:993}
      username: ${IMAP_USERNAME:}
      password: ${IMAP_PASSWORD:}
      ssl-enabled: ${IMAP_SSL_ENABLED:true}
    retry:
      max-attempts: ${MAIL_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${MAIL_RETRY_DELAY_MS:5000}
