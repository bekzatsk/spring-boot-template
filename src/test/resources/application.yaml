spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS AUTH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: auth
    show-sql: false

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  auth:
    google:
      enabled: true
      client-id: test-client-id
    apple:
      enabled: true
      bundle-id: test-bundle-id
    telegram:
      enabled: true
      bot-username: TestBot
      webhook-secret: test-secret
      session-ttl-seconds: 300
      code-length: 6
      max-attempts: 3
      resend-cooldown-seconds: 60
      max-sessions-per-ip-per-hour: 5
      max-sessions-per-telegram-user-per-hour: 3
      dev-code: ""
    refresh-token:
      expiry-days: 30
    sms:
      dev-code: ""
    verification:
      dev-code: ""
  firebase:
    enabled: false
  notification:
    token:
      max-per-user: 5
  mail:
    smtp:
      host: ""
    imap:
      host: ""
    retry:
      max-attempts: 1
      delay-ms: 100
