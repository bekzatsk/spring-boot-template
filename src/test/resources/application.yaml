spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
  auth:
    google:
      client-id: test-client-id
    apple:
      bundle-id: test-bundle-id
    refresh-token:
      expiry-days: 30
    twilio:
      account-sid: test-account-sid
      auth-token: test-auth-token
      verify-service-sid: test-verify-service-sid
